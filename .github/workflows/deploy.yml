name: Deploy to GitHub Pages
on:
  push:
    branches: "main" # o "master", controlla il nome del tuo branch
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/actions/checkout@v4
      - name: Install Node.js
        uses: actions/actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Upload Artifacts
        uses: actions/actions/upload-pages-artifact@v3
        with:
          path: dist # Se l'AI ha usato Vite, la cartella è 'dist'. Se ha usato React classico, scrivi 'build'
      - name: Deploy
        uses: actions/actions/deploy-pages@v4
